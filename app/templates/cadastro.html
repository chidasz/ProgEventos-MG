<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Cadastro</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
    padding:30px;
}

.card{
    width:500px;
    background:#1f1f1f;
    padding:30px;
    border-radius:15px;
}

.form-control{
    background:#2b2b2b;
    color:white;
    border:none;
}

.form-control:focus{
    background:#2b2b2b;
    color:white;
}

.btn-success{
    width:100%;
}

.avatar-container{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
    gap:15px;
}

.avatar-option{
    text-align:center;
    cursor:pointer;
}

.avatar-option input{
    display:none;
}

.avatar-option img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid transparent;
    transition:.3s;
}

.avatar-option input:checked + img{
    border:3px solid #28a745;
    transform:scale(1.05);
}

.avatar-option span{
    display:block;
    margin-top:8px;
}

</style>

</head>

<body>

<div class="card">

<h2 class="text-center mb-4">
Criar Conta
</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Nome de usuário</label>

<input
type="text"
name="username"
class="form-control"
required>

<br>

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

<br>

<label>Senha</label>

<input
type="password"
name="senha"
class="form-control"
required>

<br>

<label>Universidade</label>

<input
type="text"
name="universidade"
class="form-control"
placeholder="Ex.: UFLA">

<br>

<label>Escolha um avatar</label>

<div class="avatar-container">

<label class="avatar-option">

<input
type="radio"
name="avatar"
value="homem"
checked>

<img
src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<span>Homem</span>

</label>

<label class="avatar-option">

<input
type="radio"
name="avatar"
value="mulher">

<img
src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">

<span>Mulher</span>

</label>

<label class="avatar-option">

<input
type="radio"
name="avatar"
value="neutro">

<img
src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<span>Neutro</span>

</label>

</div>

<br>

<label>Ou envie uma foto personalizada</label>

<input
type="file"
name="foto"
class="form-control"
accept="image/*">

<br>

<button
type="submit"
class="btn btn-success">

Criar Conta

</button>

</form>

<div class="text-center mt-3">

<a href="{% url 'login' %}">

Já possui conta? Entrar

</a>

</div>

</div>

</body>

</html>
