<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Editar Perfil</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>

body{

background:#121212;

color:white;

}

.card{

margin:50px auto;

max-width:600px;

background:#1f1f1f;

padding:30px;

border-radius:15px;

}

.form-control{

background:#2b2b2b;

color:white;

border:none;

}

.btn{

width:100%;

}

</style>

</head>

<body>

<div class="card">

<h2 class="text-center">

Editar Perfil

</h2>

<form method="POST">

{% csrf_token %}

<label>Nome</label>

<input
type="text"
class="form-control"
name="nome"
value="{{ nome }}">

<br>

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
value="{{ email }}">

<br>

<label>Senha</label>

<input
type="password"
class="form-control"
name="senha">

<br>

<label>Avatar</label>

<select
name="avatar"
class="form-control">

<option value="homem">
Homem
</option>

<option value="mulher">
Mulher
</option>

<option value="neutro">
Neutro
</option>

</select>

<br>

<button
type="submit"
class="btn btn-success">

Salvar Alterações

</button>

</form>

</div>

</body>

</html>
