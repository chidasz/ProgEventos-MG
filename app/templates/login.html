<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProgEventos</title>

    <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background-color:#121212;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-container{
            width:450px;
        }

        .card{
            background-color:#1f1f1f;
            border:1px solid #333;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        .card-header{
            background-color:#28a745;
            color:white;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .card-body{
            padding:30px;
        }

        .form-control{
            background-color:#2b2b2b;
            border:none;
            color:white;
        }

        .form-control:focus{
            background-color:#2b2b2b;
            color:white;
            box-shadow:none;
            border:1px solid #28a745;
        }

        .btn-login{
            width:100%;
            background-color:#28a745;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background-color:#218838;
            color:white;
        }

        .voltar{
            text-align:center;
            margin-top:15px;
        }

        .voltar a{
            color:#28a745;
            text-decoration:none;
        }

        .voltar a:hover{
            color:#34ce57;
        }

        .logo{
            text-align:center;
            margin-bottom:20px;
            font-size:50px;
            color:#28a745;
        }

        .avatar-container{
    display:flex;
    justify-content:space-around;
    gap:15px;
    margin-top:10px;
}

.avatar-option{
    cursor:pointer;
    text-align:center;
}

.avatar-option input{
    display:none;
}

.avatar-option img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid transparent;
    transition:0.3s;
}

.avatar-option span{
    display:block;
    margin-top:8px;
    color:white;
}

.avatar-option input:checked + img{
    border:3px solid #28a745;
    transform:scale(1.1);
}

.admin-text{
    font-size:14px;
    color:#888;
    margin-top:18px;
}

.admin-link{
    color:#28a745;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.admin-link:hover{
    color:#34ce57;
    text-decoration:none;
}
    </style>

</head>

<body>

    <div class="login-container">

        <div class="logo">
            <i class="bi bi-code-slash"></i>
        </div>

        <div class="card">

            <div class="card-header">
                ProgEventos-MG
            </div>

            <div class="card-body">

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}
                
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text"
                               class="form-control"
                               name="nome"
                               required>
                    </div>
                
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                               class="form-control"
                               name="email"
                               required>
                    </div>
                
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password"
                               class="form-control"
                               name="senha"
                               required>
                    </div>
                
                    <div class="form-group">

                        <label>Escolha um avatar</label>
                    
                        <div class="avatar-container">
                    
                            <label class="avatar-option">
                    
                                <input
                                    type="radio"
                                    name="avatar"
                                    value="homem"
                                    checked
                                >
                    
                                <img
                                    src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
                                    alt="Avatar Homem"
                                >
                    
                                <span>Homem</span>
                    
                            </label>
                    
                            <label class="avatar-option">
                    
                                <input
                                    type="radio"
                                    name="avatar"
                                    value="mulher"
                                >
                    
                                <img
                                    src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png"
                                    alt="Avatar Mulher"
                                >
                    
                                <span>Mulher</span>
                    
                            </label>
                    
                            <label class="avatar-option">
                    
                                <input
                                    type="radio"
                                    name="avatar"
                                    value="neutro"
                                >
                    
                                <img
                                    src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
                                    alt="Avatar Neutro"
                                >
                    
                                <span>Neutro</span>
                    
                            </label>
                    
                        </div>
                    
                    </div>
                
                    <div class="form-group">
                
                        <label>Ou envie uma foto personalizada</label>
                
                        <input type="file"
                               class="form-control"
                               name="foto"
                               accept="image/*">
                
                    </div>
                
                    <button type="submit"
class="btn btn-success btn-block">

Entrar

</button>

<p class="text-center mt-3">

Ainda não possui conta?

<a href="{% url 'cadastro' %}">

Criar conta

</a>

</p>

<p class="text-center mt-3 admin-text">
    <small>
        É administrador?    
        <a href="/admin/login/" class="admin-link">
            Acesse o painel administrativo
        </a>
    </small>
</p>

         

        </div>

    </div>

</body>

</html>
