<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Competição</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>

body{
    background:#121212;
    color:white;
}

.container{
    margin-top:50px;
    max-width:700px;
}

.card{
    background:#1f1f1f;
    border:1px solid #333;
}

.card-header{
    background:#28a745;
    font-size:24px;
    text-align:center;
    color:white;
}

label{
    font-weight:bold;
}

input,
textarea,
select{
    background:#2b2b2b !important;
    color:white !important;
    border:1px solid #444 !important;
}

.btn-success{
    width:100%;
}

.btn-secondary{
    width:100%;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

Editar Competição

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="form-group">

<label>Nome</label>

{{ form.nome }}

</div>

<div class="form-group">

<label>Descrição</label>

{{ form.descricao }}

</div>

<div class="form-group">

<label>Data</label>

{{ form.data }}

</div>

<div class="form-group">

<label>Local</label>

{{ form.local }}

</div>

<div class="form-group">

<label>Organizador</label>

{{ form.organizador }}

</div>

<div class="form-group">

<label>Pessoa</label>

{{ form.pessoa }}

</div>

<div class="form-group">

<label>Universidade</label>

{{ form.universidade }}

</div>


<button type="submit" class="btn btn-success">
Salvar Alterações
</button>

<a href="/competicoes/" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</div>

</div>

</body>

</html>
